# Set the maximum line length to 120 characters
line-length = 120

# Set the target Python version
target-version = "py313"

# Define files and directories to exclude from linting
exclude = [
    "__init__.py",
    ".git",
    ".venv",
    "venv",
    ".env",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    "node_modules",
    "migrations",
    "static",
    "media",
    ".DS_Store",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    ".Python",
    "build",
    "develop-eggs",
    "dist",
    "downloads",
    "eggs",
    ".eggs",
    "lib",
    "lib64",
    "parts",
    "sdist",
    "var",
    "wheels",
    "*.egg-info",
    ".installed.cfg",
    "*.egg",
]

