fixable = ["ALL"]
unfixable = []

dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
"*/settings*.py" = [
    "F405",
    "F403",
]

"*/test_*.py" = [
    "S101",
    "PLR2004",
    "ANN201",
    "ANN001",
]

"*/tests.py" = [
    "S101",
    "PLR2004",
    "ANN201",
    "ANN001",
]

"*/models.py" = [
    "DJ008",
]

"*/admin.py" = [
    "RUF012",
]

"*/apps.py" = [
    "D101",
]

"*/urls.py" = [
    "RUF005",
]

[lint.isort]
known-first-party = ["config", "core", "finance"]
known-third-party = ["django", "rest_framework"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[lint.pydocstyle]
convention = "google"

[lint.flake8-quotes]
inline-quotes = "double"
multiline-quotes = "double"

[lint.mccabe]
max-complexity = 10

[lint.pylint]
max-args = 7
max-branches = 12
max-returns = 6
max-statements = 50
